<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMSS BIENESTAR</title>

<style>

body{
  margin:0;
  background:#0b2f25;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Segoe UI', Arial;
}

/* 📱 CONTENEDOR TIPO CELULAR */
.phone{
  width:100%;
  max-width:420px;
  height:95vh;
  background:#0f3d2e;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  color:white;
  text-align:center;
  padding:12px;
  font-size:16px;
  font-weight:bold;
}

/* CONTENIDO */
.content{
  flex:1;
  background:white;
  overflow:hidden;
}

/* IFRAME */
iframe{
  width:100%;
  height:100%;
  border:none;
}

</style>

</head>

<body>

<div class="phone">

  <div class="header">
    IMSS BIENESTAR
  </div>

  <div class="content">
    <iframe src="https://script.google.com/macros/s/AKfycbyZy-cuDrrU2HFSRy0kG5X09RJJsyCtorclE-4fzrQX4Wi2YjGyfqdqqE7r8QR5XtMD6g/exec"></iframe>
  </div>

</div>

</body>
</html>
