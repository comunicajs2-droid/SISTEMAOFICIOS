<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=0.6">

<title>IMSS BIENESTAR</title>

<style>

body{
  margin:0;
  background:#0f3d2e;
  font-family:'Segoe UI', Arial;
  display:flex;
  justify-content:center;
}

/* 🔥 CONTENEDOR TIPO APP */
.app{
  width:100%;
  max-width:420px;
  height:200vh;
  background:#0f3d2e;
  display:flex;
  flex-direction:column;
}

/* 🔥 HEADER TIPO APP */
.header{
  color:white;
  text-align:center;
  padding:12px;
  font-size:18px;
  font-weight:bold;
}

/* 🔥 CONTENIDO */
.content{
  flex:1;
  background:white;
  border-radius:12px 12px 0 0;
  overflow:hidden;
}

/* 🔥 IFRAME */
iframe{
  width:100%;
  height:100%;
  border:none;
}

</style>

</head>

<body>

<div class="app">

  <div class="header">
    IMSS BIENESTAR
  </div>

  <div class="content">
    <iframe src="https://script.google.com/macros/s/AKfycbwE_LrQdMnxqFHILUetJ0CJ8PI8sPjR08vM7y8OBqkHXsy05l0nm7fGwWFooHyzOylX2Q/exec"></iframe>
  </div>

</div>

</body>
</html>
